spring.application.name=fisiolab-system


server.port=8080

server.servlet.context-path=/api/v1

# Conexion a PostgreSQL (usar variables de entorno en producción o valores locales en desarrollo)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://ep-round-bread-amkoa3ai-pooler.c-5.us-east-1.aws.neon.tech/neondb?sslmode=require&channelBinding=require}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:neondb_owner}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:npg_qJM9bvkAPy1N}
spring.datasource.driver-class-name=org.postgresql.Driver

# Flyway deshabilitado — esquema manejado por Hibernate ddl-auto
spring.flyway.enabled=false

# Configuración de JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jackson.time-zone=America/Bogota

# Zona horaria de negocio usada para comparaciones de bloqueo
app.timezone=America/Bogota

# Configuración JWT token
jwt.secret=${JWT_SECRET:cwbF(R24pud4H1\ZS5Hcq.,4k^UW2(&4vUf,,j>d}
# Tiempo de expiración del token en milisegundos de 30 minutos
jwt.expiration=${JWT_EXPIRATION:1800000}
# Tiempo de expiracion del refresh token en milisegundos (7 dias)
jwt.refresh.expiration=${JWT_REFRESH_EXPIRATION:604800000}

# Rate limiting (requests permitidas por ventana por IP sobre /auth/**)
rate-limit.auth.capacity=10
rate-limit.auth.window-seconds=60

# Configuracion modulo tarjetero indice
app.timezone=America/Guayaquil
app.pacientes.archivo-cron=0 0 2 * * *
app.unidad-salud=Clinica Fisiolab

# Politica de bloqueo por intentos fallidos de login
auth.max-failed-attempts=5
auth.lock-minutes=15

# Almacenamiento de adjuntos de sesiones
app.storage.path=${APP_STORAGE_PATH:./uploads}

# Limites de subida de archivos
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB
